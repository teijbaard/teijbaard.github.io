---
layout: default
---

<style>
  /* ============================================================
     EXPEDITIE LAYOUT — Timeline & Journey styles
     ============================================================ */

  .expeditie-hero {
    background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy-mid) 100%);
    color: var(--white);
    padding: 4rem 0 3rem;
    position: relative;
    overflow: hidden;
  }

  .expeditie-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 80% 50%, rgba(232,160,32,0.08) 0%, transparent 60%),
      repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 60px,
        rgba(255,255,255,0.02) 60px,
        rgba(255,255,255,0.02) 61px
      );
    pointer-events: none;
  }

  .expeditie-hero .container { position: relative; }

  .expeditie-number {
    font-family: 'Bebas Neue', cursive;
    font-size: 8rem;
    line-height: 1;
    color: rgba(232,160,32,0.15);
    position: absolute;
    right: 1.25rem;
    top: -1rem;
    user-select: none;
    pointer-events: none;
  }

  .expeditie-breadcrumb {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .expeditie-breadcrumb a { color: var(--ochre); }
  .expeditie-breadcrumb a:hover { text-decoration: underline; }

  .expeditie-title {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    color: var(--white);
    margin-bottom: 1rem;
  }
  .expeditie-title span { color: var(--ochre); }

  .expeditie-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-top: 1.5rem;
  }

  .meta-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.85);
    font-size: 0.85rem;
    font-weight: 700;
    padding: 0.35rem 0.85rem;
    border-radius: 100px;
  }
  .meta-badge.highlight {
    background: rgba(232,160,32,0.2);
    border-color: var(--ochre);
    color: var(--ochre-light);
  }

  /* ============================================================
     TIMELINE
     ============================================================ */
  .timeline-section {
    padding: 4rem 0;
  }

  .timeline {
    position: relative;
    max-width: 720px;
    margin: 0 auto;
  }

  /* Vertical track rail */
  .timeline::before {
    content: '';
    position: absolute;
    left: 28px;
    top: 0; bottom: 0;
    width: 4px;
    background: linear-gradient(to bottom, var(--ochre), var(--navy));
    border-radius: 2px;
  }

  .timeline-day {
    position: relative;
    padding-left: 72px;
    margin-bottom: 3rem;
  }

  /* Train station dot */
  .timeline-day::before {
    content: '';
    position: absolute;
    left: 18px;
    top: 8px;
    width: 24px;
    height: 24px;
    background: var(--ochre);
    border: 4px solid var(--navy-dark);
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(232,160,32,0.3);
    z-index: 1;
  }

  .day-label {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.5rem;
    color: var(--ochre);
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .day-subtitle {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.75rem;
    color: var(--navy-dark);
    margin-bottom: 1rem;
  }

  .day-content {
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--ochre);
    font-size: 1rem;
    line-height: 1.8;
  }

  .highlight-box {
    background: var(--ochre-pale);
    border: 2px solid var(--ochre-light);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin: 1rem 0;
    font-weight: 700;
    color: var(--navy-dark);
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
  }

  .highlight-box .icon {
    font-size: 1.5rem;
    flex-shrink: 0;
    line-height: 1;
  }

  /* ============================================================
     CONTENT ARTICLE (fallback for non-timeline posts)
     ============================================================ */
  .expeditie-body {
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 2.5rem;
    box-shadow: var(--shadow);
    max-width: 720px;
    margin: 0 auto;
  }

  .expeditie-body h2 {
    font-size: 2rem;
    color: var(--navy-dark);
    margin: 2rem 0 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 3px solid var(--ochre);
    display: inline-block;
  }

  .expeditie-body h3 {
    font-size: 1.5rem;
    color: var(--navy);
    margin: 1.5rem 0 0.5rem;
  }

  .expeditie-body ul, .expeditie-body ol {
    padding-left: 1.5rem;
    margin-bottom: 1rem;
  }

  .expeditie-body li { margin-bottom: 0.4rem; }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width: 640px) {
    .expeditie-number { display: none; }
    .timeline::before { left: 16px; }
    .timeline-day { padding-left: 52px; }
    .timeline-day::before { left: 6px; width: 20px; height: 20px; }
    .expeditie-body { padding: 1.5rem; }
  }
</style>

{{ content }}
