---
layout: default
---

<style>
  /* ============================================================
     EXPEDITIE LAYOUT
     ============================================================ */
  .exp-hero {
    background: var(--text);
    color: #fff;
    padding: 4rem 0 3.5rem;
  }

  .exp-breadcrumb {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.4);
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 1.75rem;
    font-weight: 500;
  }
  .exp-breadcrumb a { color: var(--rust-mid); transition: color var(--t); }
  .exp-breadcrumb a:hover { color: #fff; }

  .exp-hero h1 {
    font-size: clamp(2.5rem, 5.5vw, 4rem);
    color: #fff;
    margin-bottom: 1.25rem;
    line-height: 1.05;
  }
  .exp-hero h1 span { color: var(--rust-mid); }

  .exp-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .exp-tag {
    font-family: 'Fira Sans', sans-serif;
    font-weight: 800;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.3rem 0.75rem;
    border-radius: 100px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.7);
  }
  .exp-tag.accent {
    background: rgba(200, 81, 26, 0.2);
    border-color: var(--rust-mid);
    color: #f5a07a;
  }

  /* ============================================================
     TIMELINE
     ============================================================ */
  .timeline-section {
    padding: 4.5rem 0 5rem;
  }

  .timeline-wrap {
    max-width: 680px;
    margin: 0 auto;
    position: relative;
  }

  /* vertical rail */
  .timeline-wrap::before {
    content: '';
    position: absolute;
    left: 20px;
    top: 8px;
    bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, var(--rust), var(--border));
    border-radius: 2px;
  }

  .timeline-day {
    position: relative;
    padding-left: 60px;
    margin-bottom: 3rem;
  }

  /* Station dot */
  .timeline-day::before {
    content: '';
    position: absolute;
    left: 12px;
    top: 10px;
    width: 18px;
    height: 18px;
    background: var(--surface);
    border: 3px solid var(--rust);
    border-radius: 50%;
    z-index: 1;
  }

  .day-label {
    font-family: 'Fira Sans', sans-serif;
    font-weight: 800;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--rust);
    margin-bottom: 0.35rem;
  }

  .day-heading {
    font-size: 1.6rem;
    color: var(--text);
    margin-bottom: 1rem;
  }

  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
  }

  .day-card p {
    color: var(--text-muted);
    font-size: 0.975rem;
    line-height: 1.8;
  }

  .highlight-box {
    background: var(--rust-light);
    border: 1px solid rgba(200, 81, 26, 0.2);
    border-left: 3px solid var(--rust);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin: 1rem 0;
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
    font-size: 0.95rem;
  }
  .highlight-box .icon { font-size: 1.25rem; flex-shrink: 0; line-height: 1.4; }
  .highlight-box p { color: var(--text); margin: 0; }
  .highlight-box strong { color: var(--rust-dark); }

  .tip-box {
    background: var(--forest-light);
    border: 1px solid rgba(58, 107, 78, 0.2);
    border-left: 3px solid var(--forest);
    border-radius: var(--radius);
    padding: 0.875rem 1.125rem;
    margin: 1rem 0;
    display: flex;
    gap: 0.75rem;
    font-size: 0.9rem;
    color: var(--text-muted);
  }
  .tip-box .icon { font-size: 1.1rem; flex-shrink: 0; line-height: 1.5; }
  .tip-box strong { color: var(--forest); }

  /* Video teaser */
  .video-teaser {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2rem;
    text-align: center;
    margin: 2.5rem 0;
    max-width: 680px;
    margin-left: auto;
    margin-right: auto;
  }
  .video-teaser h3 { font-size: 1.5rem; color: var(--text); margin-bottom: 0.5rem; }
  .video-teaser p  { color: var(--text-muted); margin-bottom: 1.25rem; font-size: 0.95rem; }

  /* Pagination */
  .exp-nav {
    max-width: 680px;
    margin: 3rem auto 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    .timeline-wrap::before { left: 12px; }
    .timeline-day { padding-left: 44px; }
    .timeline-day::before { left: 4px; width: 16px; height: 16px; }
  }
</style>

{{ content }}
