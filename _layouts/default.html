<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="keywords" content="Treinspotter, Stoomtreinen, Junior Expert, NS 1607, VSM 23076, ICE, ICNG, Goederentreinen, Tijmen op Stoom">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:image" content="{{ '/assets/img/logo.webp' | absolute_url }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ '/assets/img/logo.webp' | absolute_url }}">

  <!-- Fonts: Bebas Neue (display/industrial) + Nunito (kid-friendly body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="{{ '/assets/img/logo.webp' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/img/logo.webp' | relative_url }}">

  <style>
    /* ============================================================
       DESIGN TOKENS
       ============================================================ */
    :root {
      --navy:        #1A3A5C;
      --navy-dark:   #0D1F33;
      --navy-mid:    #234873;
      --ochre:       #E8A020;
      --ochre-light: #F5C55A;
      --ochre-pale:  #FDF3DC;
      --white:       #FFFFFF;
      --off-white:   #F8F5EE;
      --text:        #1A1A2E;
      --text-muted:  #5A6272;
      --radius:      12px;
      --radius-lg:   20px;
      --shadow:      0 4px 24px rgba(13, 31, 51, 0.12);
      --shadow-lg:   0 12px 48px rgba(13, 31, 51, 0.20);
      --transition:  0.25s ease;
      --max-width:   1100px;
    }

    /* ============================================================
       RESET & BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--off-white);
      color: var(--text);
      line-height: 1.7;
      overflow-x: hidden;
    }

    img { max-width: 100%; height: auto; display: block; }
    a { color: inherit; text-decoration: none; }

    h1, h2, h3, h4, .display {
      font-family: 'Bebas Neue', cursive;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    p { margin-bottom: 1rem; }
    p:last-child { margin-bottom: 0; }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 1.25rem;
    }

    /* ============================================================
       TRAIN TRACK DIVIDER
       ============================================================ */
    .track-line {
      height: 8px;
      background:
        linear-gradient(var(--navy-dark), var(--navy-dark)) center/100% 2px no-repeat,
        repeating-linear-gradient(
          90deg,
          var(--ochre) 0px,
          var(--ochre) 24px,
          transparent 24px,
          transparent 36px
        );
    }

    /* ============================================================
       STEAM ANIMATION
       ============================================================ */
    @keyframes steam-rise {
      0%   { opacity: 0.7; transform: translateY(0)    scale(0.8); }
      60%  { opacity: 0.4; transform: translateY(-30px) scale(1.4); }
      100% { opacity: 0;   transform: translateY(-60px) scale(2.0); }
    }
    @keyframes steam-drift {
      0%   { opacity: 0.6; transform: translateY(0)    translateX(0)   scale(0.7); }
      100% { opacity: 0;   transform: translateY(-50px) translateX(20px) scale(1.8); }
    }

    .steam-container {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      pointer-events: none;
    }

    .steam-puff {
      width: 18px;
      height: 18px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: steam-rise 2s ease-out infinite;
      filter: blur(4px);
    }
    .steam-puff:nth-child(2) { animation-delay: 0.6s; width: 14px; height: 14px; }
    .steam-puff:nth-child(3) { animation-delay: 1.2s; width: 10px; height: 10px; animation-name: steam-drift; }

    /* ============================================================
       HEADER
       ============================================================ */
    .site-header {
      background: var(--navy-dark);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .site-header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
      gap: 1.5rem;
    }

    .logo-link {
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .site-logo {
      height: 52px;
      width: auto;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
      transition: transform var(--transition);
    }
    .site-logo:hover { transform: scale(1.05) rotate(-1deg); }

    /* Nav */
    .site-nav {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .site-nav a {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.15rem;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.8);
      padding: 0.5rem 0.9rem;
      border-radius: var(--radius);
      transition: color var(--transition), background var(--transition);
      position: relative;
    }

    .site-nav a:hover,
    .site-nav a.active {
      color: var(--ochre);
      background: rgba(232, 160, 32, 0.1);
    }

    .site-nav a.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 3px;
      background: var(--ochre);
      border-radius: 2px;
    }

    /* Hamburger */
    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 8px;
    }
    .nav-toggle span {
      display: block;
      width: 26px;
      height: 2.5px;
      background: var(--white);
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    .nav-toggle.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    .nav-toggle.open span:nth-child(2) { opacity: 0; }
    .nav-toggle.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

    /* ============================================================
       MAIN CONTENT
       ============================================================ */
    main { min-height: 60vh; }

    /* ============================================================
       BUTTONS
       ============================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Bebas Neue', cursive;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      padding: 0.75rem 1.75rem;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
    }

    .btn-primary {
      background: var(--ochre);
      color: var(--navy-dark);
      box-shadow: 0 4px 16px rgba(232, 160, 32, 0.35);
    }
    .btn-primary:hover {
      background: var(--ochre-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(232, 160, 32, 0.45);
    }

    .btn-outline {
      background: transparent;
      color: var(--white);
      border: 2px solid var(--ochre);
    }
    .btn-outline:hover {
      background: var(--ochre);
      color: var(--navy-dark);
      transform: translateY(-2px);
    }

    .btn-navy {
      background: var(--navy);
      color: var(--white);
      box-shadow: var(--shadow);
    }
    .btn-navy:hover {
      background: var(--navy-mid);
      transform: translateY(-2px);
    }

    /* ============================================================
       CARDS
       ============================================================ */
    .card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    /* ============================================================
       SECTION HEADERS
       ============================================================ */
    .section-label {
      display: inline-block;
      font-family: 'Bebas Neue', cursive;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      color: var(--ochre);
      background: var(--navy-dark);
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      margin-bottom: 0.75rem;
    }

    /* ============================================================
       RESPONSIVE YOUTUBE EMBED
       ============================================================ */
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
      overflow: hidden;
      border-radius: var(--radius);
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* ============================================================
       FOOTER
       ============================================================ */
    .site-footer {
      background: var(--navy-dark);
      color: rgba(255,255,255,0.7);
      margin-top: 4rem;
    }

    .footer-inner {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 2rem;
      padding: 3rem 0 2rem;
    }

    .footer-logo {
      height: 80px;
      width: auto;
      margin: 0 auto;
      filter: drop-shadow(0 2px 12px rgba(0,0,0,0.5));
    }

    .social-links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .social-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'Bebas Neue', cursive;
      font-size: 1rem;
      letter-spacing: 0.1em;
      padding: 0.6rem 1.25rem;
      border-radius: var(--radius);
      transition: all var(--transition);
    }

    .social-btn.yt {
      background: #FF0000;
      color: var(--white);
    }
    .social-btn.yt:hover { background: #CC0000; transform: scale(1.04); }

    .social-btn.ig {
      background: linear-gradient(135deg, #833AB4, #FD1D1D, #FCAF45);
      color: var(--white);
    }
    .social-btn.ig:hover { opacity: 0.9; transform: scale(1.04); }

    .social-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

    .footer-meta {
      text-align: right;
      font-size: 0.85rem;
      line-height: 1.8;
    }

    .parental-notice {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.45);
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 1.5rem;
      margin-top: 1.5rem;
      text-align: center;
    }

    /* ============================================================
       UTILITIES
       ============================================================ */
    .text-ochre  { color: var(--ochre); }
    .text-navy   { color: var(--navy); }
    .text-muted  { color: var(--text-muted); }
    .text-center { text-align: center; }
    .text-white  { color: var(--white); }

    .bg-navy     { background: var(--navy); }
    .bg-dark     { background: var(--navy-dark); }
    .bg-pale     { background: var(--ochre-pale); }
    .bg-white    { background: var(--white); }

    .py-sm  { padding-top: 2rem;  padding-bottom: 2rem; }
    .py-md  { padding-top: 3.5rem; padding-bottom: 3.5rem; }
    .py-lg  { padding-top: 5rem;  padding-bottom: 5rem; }

    .mt-sm { margin-top: 1rem; }
    .mt-md { margin-top: 2rem; }
    .mt-lg { margin-top: 3rem; }
    .mb-md { margin-bottom: 2rem; }

    /* ============================================================
       MOBILE RESPONSIVE
       ============================================================ */
    @media (max-width: 768px) {
      .site-header .container { height: 64px; }

      .nav-toggle { display: flex; }

      .site-nav {
        display: none;
        position: absolute;
        top: 100%;
        left: 0; right: 0;
        background: var(--navy-dark);
        flex-direction: column;
        align-items: stretch;
        padding: 1rem;
        gap: 0.25rem;
        border-top: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      }
      .site-nav.open { display: flex; }
      .site-nav a { font-size: 1.3rem; padding: 0.75rem 1rem; }
      .site-nav a.active::after { display: none; }

      .footer-inner {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .footer-meta { text-align: center; }
      .social-links { align-items: center; }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       HEADER
       ============================================================ -->
  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="logo-link" aria-label="Tijmen op Stoom – Home">
        <img src="{{ '/assets/img/logo.webp' | relative_url }}" alt="Tijmen op Stoom logo" class="site-logo">
      </a>

      <button class="nav-toggle" aria-label="Menu openen" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <nav class="site-nav" aria-label="Hoofdnavigatie">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active" aria-current="page"{% endif %}>Home</a>
        <a href="{{ '/over' | relative_url }}"{% if page.url contains '/over' %} class="active" aria-current="page"{% endif %}>Over Tijmen</a>
        <a href="{{ '/expedities' | relative_url }}"{% if page.url contains 'expediti' %} class="active" aria-current="page"{% endif %}>Expedities</a>
        <a href="{{ '/contact' | relative_url }}"{% if page.url contains '/contact' %} class="active" aria-current="page"{% endif %}>Contact</a>
      </nav>
    </div>
    <div class="track-line"></div>
  </header>

  <!-- ============================================================
       MAIN CONTENT
       ============================================================ -->
  <main id="main-content">
    {{ content }}
  </main>

  <!-- ============================================================
       FOOTER
       ============================================================ -->
  <footer class="site-footer">
    <div class="track-line"></div>
    <div class="container">
      <div class="footer-inner">

        <div class="social-links">
          <!-- YouTube -->
          <a href="{{ site.social.youtube }}" target="_blank" rel="noopener noreferrer" class="social-btn yt">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
            </svg>
            YouTube
          </a>
          <!-- Instagram -->
          <a href="{{ site.social.instagram }}" target="_blank" rel="noopener noreferrer" class="social-btn ig">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
            </svg>
            Instagram
          </a>
        </div>

        <img src="{{ '/assets/img/logo.webp' | relative_url }}" alt="Tijmen op Stoom" class="footer-logo">

        <div class="footer-meta">
          <p style="color: rgba(255,255,255,0.6); font-size:0.9rem; margin-bottom:0.5rem;">
            Junior treinspotter<br>op avontuur langs de rails
          </p>
          <p style="color: rgba(255,255,255,0.35); font-size:0.8rem;">
            &copy; {{ 'now' | date: '%Y' }} Tijmen op Stoom
          </p>
        </div>

      </div>

      <p class="parental-notice">
        Dit platform wordt beheerd door de ouders van Tijmen. &nbsp;|&nbsp;
        <a href="{{ '/contact' | relative_url }}" style="color:var(--ochre);">Contact &amp; zakelijke aanvragen</a>
      </p>
    </div>
  </footer>

  <script>
    // Mobile nav toggle
    const toggle = document.querySelector('.nav-toggle');
    const nav    = document.querySelector('.site-nav');
    toggle.addEventListener('click', () => {
      const isOpen = nav.classList.toggle('open');
      toggle.classList.toggle('open', isOpen);
      toggle.setAttribute('aria-expanded', isOpen);
    });

    // Close nav on link click (mobile)
    nav.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        nav.classList.remove('open');
        toggle.classList.remove('open');
        toggle.setAttribute('aria-expanded', 'false');
      });
    });
  </script>

</body>
</html>
